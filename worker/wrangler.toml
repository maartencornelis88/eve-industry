name              = "eve-industry-worker"
main              = "src/index.ts"
compatibility_date = "2024-09-23"

[[routes]]
pattern   = "adurrant.com/*"
zone_name = "adurrant.com"

[[routes]]
pattern   = "adurrant.com/eve/*"
zone_name = "adurrant.com"

[[d1_databases]]
binding       = "DB"
database_name = "eve-industry"
database_id   = "YOUR_D1_DATABASE_ID_HERE"

[[kv_namespaces]]
binding    = "TOKEN_STORE"
id         = "YOUR_KV_NAMESPACE_ID_HERE"
preview_id = "YOUR_KV_NAMESPACE_PREVIEW_ID_HERE"

[triggers]
crons = ["0 5 * * *"]
